<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Byeonghun</title>
    <meta
      name="description"
      content="A color that makes the city pause. A minimal photo portfolio."
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="site-shell">
      <div class="global-marquee" aria-hidden="true">
        <div class="global-marquee-track">
          <div class="global-marquee-group">
            <span>Work in progress</span>
            <span>Work in progress</span>
            <span>Work in progress</span>
          </div>
          <div class="global-marquee-group">
            <span>Work in progress</span>
            <span>Work in progress</span>
            <span>Work in progress</span>
          </div>
        </div>
      </div>

      <header class="site-header">
        <a class="brand" href="#home-view">PARK BYEONGHUN</a>
        <button class="about-link" type="button" id="about-button">ABOUT</button>
      </header>

      <section class="about-panel hidden" id="about-panel" aria-hidden="true">
        <p>
          site under construction
        </p>
      </section>

      <section class="view home-view" id="home-view" data-view="home">
        <div class="home-layout">
          <div class="home-copy">
            <p class="home-label">PHOTOS</p>
            <div class="home-flow-row">
              <span class="home-index">1</span>
              <h1 class="home-title">A color that makes the city pause</h1>
              <button class="home-date" id="cover-trigger" type="button" aria-label="Open photo series">
                April 7, 2026
              </button>
              <button class="home-thumb" id="cover-trigger-image" type="button" aria-label="Open photo series">
                <img src="./assets/flowers/IMG_2911.JPG" alt="Pink flowers in front of a building" />
              </button>
            </div>
          </div>
        </div>

        <div class="category-layout ceramics-layout">
          <div class="category-copy">
            <p class="home-label">CERAMICS</p>
            <div class="ceramic-row ceramic-row-primary">
              <div class="ceramic-flow-row">
                <span class="home-index">1</span>
                <h2 class="ceramic-title">Mini Moon Jar</h2>
                <p class="ceramic-date">March, 2026</p>
                <div class="ceramic-thumb ceramic-thumb-jar" aria-hidden="true"></div>
                <span class="ceramic-side-index">2</span>
                <h2 class="ceramic-title ceramic-inline-title">Cups 01–04</h2>
                <p class="ceramic-date">March, 2026</p>
                <div class="ceramic-thumb ceramic-thumb-cups" aria-hidden="true"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="view detail-view hidden" id="detail-view" data-view="detail" aria-hidden="true">
        <div class="detail-gallery" id="detail-gallery"></div>
      </section>

      <section class="view fullscreen-view hidden" id="fullscreen-view" data-view="fullscreen" aria-hidden="true">
        <button class="fullscreen-close" id="fullscreen-close" type="button" aria-label="Close fullscreen image">
          BACK
        </button>
        <button class="fullscreen-nav fullscreen-prev" id="fullscreen-prev" type="button" aria-label="Previous image">
          &larr;
        </button>
        <div class="fullscreen-frame">
          <img class="fullscreen-slide is-active" id="fullscreen-image-current" src="" alt="" />
          <img class="fullscreen-slide" id="fullscreen-image-next" src="" alt="" />
        </div>
        <button class="fullscreen-nav fullscreen-next" id="fullscreen-next" type="button" aria-label="Next image">
          &rarr;
        </button>
        <p class="fullscreen-caption" id="fullscreen-caption">April 7, 2026</p>
      </section>
    </main>

    <template id="detail-item-template">
      <button class="detail-item" type="button">
        <img class="detail-image" src="" alt="" />
      </button>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
